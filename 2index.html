<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>부산교통공사 제2여객사업소</title>
  <script>
    (function () {
      var savedTheme = localStorage.getItem('theme_pref');
      var theme = savedTheme || 'dark';

      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme === 'light' ? 'only light' : 'dark';
    })();
  </script>
  <style>
    :root {
      --content-max: calc(1280px - 6cm);
      --page-gutter: 24px;
      --primary: #0057a8;
      --accent: #00a3e0;
      --bg: #f7faff;
      --text: #0b1a2b;
      --muted: #4b5b6b;
      --header-bg: #ffffff;
      --card-bg: #ffffff;
      --border: #dbe7f6;
      --shadow: rgba(3, 24, 60, 0.08);
      --shadow-hover: rgba(3, 24, 60, 0.14);
      --focus: rgba(0, 87, 168, 0.18);
      --icon-primary: #0057a8;
      --icon-secondary: #00a3e0;
    }

    :root[data-theme="dark"] {
      --primary: #7ab8ff;
      --accent: #4dd4ff;
      --bg: #171a20;
      --text: #f4f7fb;
      --muted: #b6c2cf;
      --header-bg: #101318;
      --card-bg: #11151b;
      --border: #2a303a;
      --shadow: rgba(0, 0, 0, 0.34);
      --shadow-hover: rgba(0, 0, 0, 0.52);
      --focus: rgba(122, 184, 255, 0.28);
      --icon-primary: #7ab8ff;
      --icon-secondary: #4dd4ff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
      color-scheme: only light;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
    }

    html[data-theme="light"] {
      color-scheme: only light;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      transition: background-color 180ms ease, color 180ms ease;
    }

    .site-header {
      padding: 0 var(--page-gutter);
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      transition: background-color 180ms ease, border-color 180ms ease;
    }

    .header-shell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
      max-width: var(--content-max);
      min-height: 64px;
      margin: 0 auto;
    }

    .header-left,
    .header-right {
      display: flex;
      align-items: center;
    }

    .header-left {
      min-width: 0;
      gap: 12px;
    }

    .header-right {
      flex: 0 0 auto;
      gap: 14px;
    }

    .logo-text {
      overflow: hidden;
      color: var(--primary);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-info {
      color: var(--muted);
      font-size: 14px;
    }

    .theme-toggle-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 0;
      color: var(--text);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .theme-toggle-btn:hover {
      background: color-mix(in srgb, var(--primary) 10%, transparent);
      border-color: var(--border);
    }

    .theme-toggle-btn:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .sun-icon,
    .moon-icon {
      width: 20px;
      height: 20px;
    }

    :root[data-theme="dark"] .sun-icon,
    :root[data-theme="light"] .moon-icon {
      display: block;
    }

    :root[data-theme="dark"] .moon-icon,
    :root[data-theme="light"] .sun-icon {
      display: none;
    }

    .container {
      width: calc(100% - (var(--page-gutter) * 2));
      max-width: var(--content-max);
      margin: 34px auto 0;
      padding: 0 0 48px;
    }

    .page-title {
      margin: 0 0 16px;
      font-size: 20px;
      line-height: 1.35;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 84px;
      padding: 16px;
      color: inherit;
      text-decoration: none;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 6px 18px var(--shadow);
      transition: transform 160ms ease, box-shadow 160ms ease, background-color 180ms ease, border-color 180ms ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px var(--shadow-hover);
    }

    .card:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    .card-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 48px;
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
    }

    .card-icon svg {
      width: 32px;
      height: 32px;
    }

    .card-body {
      min-width: 0;
    }

    .card-title {
      margin: 0 0 4px;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
    }

    .card-desc {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .card-cta {
      flex: 0 0 auto;
      margin-left: auto;
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 767px) {
      :root {
        --page-gutter: 14px;
      }

      .site-header {
        padding: 0 var(--page-gutter);
      }

      .logo-text {
        font-size: 15px;
      }

      .user-info {
        display: none;
      }

      .card-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-shell">
      <div class="header-left">
        <div class="logo-text">부산교통공사 제2여객사업소</div>
      </div>
      <div class="header-right">
        <div class="user-info">지원팀</div>
        <button id="theme-toggle" class="theme-toggle-btn" type="button" aria-label="라이트 모드로 전환" title="화면 모드 전환">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">업무 바로가기</h1>

    <section class="card-grid" aria-label="업무 바로가기">
      <a class="card" href="https://juyaro.github.io/" target="_blank" rel="noopener noreferrer" aria-label="인사 페이지로 이동">
        <div class="card-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z" fill="var(--icon-primary)"></path>
            <path d="M4 20c0-2.21 3.58-4 8-4s8 1.79 8 4v1H4v-1z" fill="var(--icon-secondary)"></path>
          </svg>
        </div>
        <div class="card-body">
          <h2 class="card-title">인사</h2>
          <p class="card-desc">인사기록, 인사발령, 인사배치 신호 등 조회</p>
        </div>
        <span class="card-cta">이동</span>
      </a>

      <a class="card" href="https://juyaro.github.io/vudwjd.html" target="_blank" rel="noopener noreferrer" aria-label="행정 페이지로 이동">
        <div class="card-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="3" y="6" width="18" height="12" rx="2" fill="var(--icon-primary)"></rect>
            <path d="M7 10h10" stroke="#fff" stroke-width="1.5"></path>
          </svg>
        </div>
        <div class="card-body">
          <h2 class="card-title">행정</h2>
          <p class="card-desc">행정 관련 업무 및 결과 확인</p>
        </div>
        <span class="card-cta">이동</span>
      </a>

      <a class="card" href="https://juyaro.github.io/employee.html" target="_blank" rel="noopener noreferrer" aria-label="직원현황 페이지로 이동">
        <div class="card-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z" fill="var(--icon-primary)"></path>
            <rect x="3" y="14" width="18" height="6" rx="1" fill="var(--icon-secondary)"></rect>
          </svg>
        </div>
        <div class="card-body">
          <h2 class="card-title">직원현황</h2>
          <p class="card-desc">부서별 인원 및 직급별 신호기 자격 현황</p>
        </div>
        <span class="card-cta">이동</span>
      </a>

      <a class="card" href="https://juyaro.github.io/water.html" target="_blank" rel="noopener noreferrer" aria-label="수도 페이지로 이동">
        <div class="card-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="10" r="4" fill="var(--icon-secondary)"></circle>
            <path d="M4 20c2-3 6-5 8-5s6 2 8 5" stroke="var(--icon-primary)" stroke-width="1.2"></path>
          </svg>
        </div>
        <div class="card-body">
          <h2 class="card-title">수도</h2>
          <p class="card-desc">수도 관련 업무 및 통계</p>
        </div>
        <span class="card-cta">이동</span>
      </a>
    </section>
  </main>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const root = document.documentElement;

    function applyTheme(theme) {
      root.dataset.theme = theme;
      root.style.colorScheme = theme === 'light' ? 'only light' : 'dark';
      localStorage.setItem('theme_pref', theme);
      themeToggle.setAttribute('aria-label', theme === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환');
    }

    themeToggle.addEventListener('click', function () {
      applyTheme(root.dataset.theme === 'dark' ? 'light' : 'dark');
    });

    applyTheme(root.dataset.theme || 'dark');
  </script>
</body>
</html>
