<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>시스템 보안 인증</title>
<style>
  :root { color-scheme: dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #070d1a; color: #f7fbff; }
  main { width: min(92vw, 360px); background: #111827; border: 1px solid #263858; border-radius: 10px; padding: 30px 40px 30px; box-shadow: 0 22px 55px rgba(0, 0, 0, .2); text-align: center; }
  .badge { width: 50px; height: 50px; margin: 0 auto 18px; display: grid; place-items: center; border-radius: 11px; background: linear-gradient(135deg, #2f6df2 0%, #0ea5bd 100%); color: #fff; font-size: 26px; font-weight: 800; line-height: 1; }
  h1 { margin: 0 0 14px; font-size: 20px; line-height: 1.25; letter-spacing: 0; font-weight: 800; }
  p { margin: 0 0 20px; color: #9fb8dc; font-size: 12px; line-height: 1.45; font-weight: 700; }
  input { width: 100%; height: 38px; border: 1px solid #2c4165; border-radius: 5px; background: #1b2638; color: #eef6ff; padding: 0 12px; font-size: 14px; text-align: center; }
  input::placeholder { color: #94a3b8; opacity: 1; }
  input:focus { outline: 2px solid rgba(59, 130, 246, .35); border-color: #3b82f6; }
  button { width: 100%; height: 41px; margin-top: 12px; border: 0; border-radius: 5px; background: #4285f4; color: #fff; font-weight: 800; font-size: 14px; cursor: pointer; }
  button:hover { background: #3b78df; }
  button:disabled { opacity: .72; cursor: wait; }
  #message { min-height: 20px; margin-top: 10px; color: #ff8f8f; font-size: 12px; font-weight: 700; }
  @media (max-width: 420px) {
    main { width: min(92vw, 340px); padding: 28px 24px; }
  }
</style>
</head>
<body>
<main>
  <div class="badge">2</div>
  <h1>시스템 보안 인증</h1>
  <p>이동 관리 대시보드에 접근하기 위해<br />비밀번호를 입력해 주십시오.</p>
  <form id="unlockForm" autocomplete="off">
    <input id="password" name="password" type="password" placeholder="비밀번호 입력" required autofocus aria-label="비밀번호 입력" />
    <button id="unlockButton" type="submit">확인</button>
    <div id="message" aria-live="polite"></div>
  </form>
</main>

const block = (event) => {
  const key = (event.key || '').toLowerCase();
  if (event.type === 'contextmenu' ||
      (event.ctrlKey && ['u', 's', 'p'].includes(key)) ||
      (event.ctrlKey && event.shiftKey && ['i', 'j', 'c'].includes(key)) ||
      key === 'f12') {
    event.preventDefault();
    event.stopPropagation();
    return false;
  }
};
['contextmenu', 'keydown'].forEach((type) => document.addEventListener(type, block, true));

function fromBase64(value) {
  const binary = atob(value);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

async function decryptPage(password) {
  const encodedPassword = new TextEncoder().encode(password);
  const baseKey = await crypto.subtle.importKey('raw', encodedPassword, 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: fromBase64(encryptedPage.salt), iterations: encryptedPage.iterations, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
  const plainBuffer = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: fromBase64(encryptedPage.iv) },
    key,
    fromBase64(encryptedPage.data)
  );
  return new TextDecoder('utf-8').decode(plainBuffer);
}

document.getElementById('unlockForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const button = document.getElementById('unlockButton');
  const message = document.getElementById('message');
  button.disabled = true;
  message.textContent = '확인 중입니다...';
  try {
    const html = await decryptPage(document.getElementById('password').value);
    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    message.textContent = '암호가 맞지 않습니다.';
    button.disabled = false;
  }
});
</script>
