        };

        // Right click block
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Keyboard shortcuts block (F12, Ctrl+U, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+S)
        document.addEventListener('keydown', e => {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) ||
                (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's'))
            ) {
                e.preventDefault();
            }
        });

        // Enter key press support
        document.getElementById("sys-auth-pwd").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkPasswordAuthentication();
            }
        });
        document.getElementById("sys-auth-pwd").focus();

        async function decryptPayload(password) {
            const salt = new Uint8Array(atob(encryptedData.salt).split('').map(c => c.charCodeAt(0)));
            const iv = new Uint8Array(atob(encryptedData.iv).split('').map(c => c.charCodeAt(0)));
            const ciphertext = new Uint8Array(atob(encryptedData.ciphertext).split('').map(c => c.charCodeAt(0)));

            const enc = new TextEncoder();
            const keyMaterial = await window.crypto.subtle.importKey(
                "raw",
                enc.encode(password),
                { name: "PBKDF2" },
                false,
                ["deriveBits", "deriveKey"]
            );

            const key = await window.crypto.subtle.deriveKey(
                {
                    name: "PBKDF2",
                    salt: salt,
                    iterations: 100000,
                    hash: "SHA-256"
                },
                keyMaterial,
                { name: "AES-CBC", length: 256 },
                false,
                ["decrypt"]
            );

            const decryptedBuffer = await window.crypto.subtle.decrypt(
                {
                    name: "AES-CBC",
                    iv: iv
                },
                key,
                ciphertext
            );

            const dec = new TextDecoder();
            return dec.decode(decryptedBuffer);
        }

        async function checkPasswordAuthentication() {
            const pwd = document.getElementById("sys-auth-pwd").value;
            const err = document.getElementById("pwd-error-msg");
            err.style.display = "none";

            try {
                const decryptedHtml = await decryptPayload(pwd);

                // Save auth session and password so it survives page refreshes
                sessionStorage.setItem("sys_auth", "true");
                sessionStorage.setItem("sys_pwd", pwd);

                // Write decrypted HTML
                document.open();
                document.write(decryptedHtml);
                document.close();

            } catch (error) {
                console.error("Authentication failed:", error);
                err.style.display = "block";
                document.getElementById("sys-auth-pwd").value = "";
                document.getElementById("sys-auth-pwd").focus();
            }
        }

        // Auto decrypt if session is already active
        async function autoDecrypt() {
            const cachedPwd = sessionStorage.getItem("sys_pwd");
            if (sessionStorage.getItem("sys_auth") === "true" && cachedPwd) {
                try {
                    const decryptedHtml = await decryptPayload(cachedPwd);
                    document.open();
                    document.write(decryptedHtml);
                    document.close();
                } catch (error) {
                    console.error("Auto decryption failed:", error);
                    sessionStorage.removeItem("sys_auth");
                    sessionStorage.removeItem("sys_pwd");
                }
            }
        }

        autoDecrypt();
    </script>
